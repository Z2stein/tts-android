name: Android checks and debug APK

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  checks-and-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Run automated checks
        run: gradle :domain:check :app:check

      - name: Detect APK task support
        id: apk-task
        run: |
          if gradle :app:tasks --all | grep -q "assembleDebug"; then
            echo "has_apk_task=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apk_task=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build debug APK
        if: steps.apk-task.outputs.has_apk_task == 'true'
        run: gradle :app:assembleDebug

      - name: Upload debug APK artifact
        if: steps.apk-task.outputs.has_apk_task == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tts-android-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Upload check reports (no APK yet)
        if: steps.apk-task.outputs.has_apk_task != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tts-android-check-reports
          path: |
            app/build/reports/**
            domain/build/reports/**
          if-no-files-found: warn

      - name: Workflow summary
        if: always()
        run: |
          if [ "${{ steps.apk-task.outputs.has_apk_task }}" = "true" ]; then
            echo "✅ Debug APK built and uploaded as artifact: tts-android-debug-apk" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "⚠️ This repository does not expose :app:assembleDebug yet, so no APK artifact was generated." >> "$GITHUB_STEP_SUMMARY"
            echo "✅ Automated checks still ran (:domain:check and :app:check)." >> "$GITHUB_STEP_SUMMARY"
          fi
