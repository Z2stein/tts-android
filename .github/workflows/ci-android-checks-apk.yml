name: Android Checks + Debug APK

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  push:

jobs:
  verify-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14.3'

      - name: Run automated checks
        run: gradle --no-daemon --console=plain :domain:check :app:check

      - name: Build debug APK
        run: gradle --no-daemon --console=plain :app:assembleDebug

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-android-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error

      - name: Publish final summary
        run: |
          echo "## Android Checks + Debug APK Ergebnis" >> "$GITHUB_STEP_SUMMARY"
          echo "- Ergebnis: Debug-APK erfolgreich gebaut und hochgeladen." >> "$GITHUB_STEP_SUMMARY"
          echo "- Downloadbares Artifact: \\`tts-android-debug-apk\\`." >> "$GITHUB_STEP_SUMMARY"
          echo "- Ausgeführt: \\`:domain:check\\`, \\`:app:check\\`, \\`:app:assembleDebug\\`." >> "$GITHUB_STEP_SUMMARY"
